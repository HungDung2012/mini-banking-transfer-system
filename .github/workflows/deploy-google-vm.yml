name: Deploy Google VM

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      deploy_profile:
        description: "Compose profile to deploy on the VM"
        required: true
        default: core
        type: choice
        options:
          - core
          - full

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    env:
      DEPLOY_PROFILE: ${{ github.event_name == 'workflow_dispatch' && inputs.deploy_profile || 'core' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          project_id: ${{ vars.GCP_PROJECT_ID }}
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v3
        with:
          project_id: ${{ vars.GCP_PROJECT_ID }}
          version: ">= 416.0.0"

      - name: Package repository
        run: git archive --format=tar.gz --output=deploy.tgz HEAD

      - name: Copy bundle to VM
        run: |
          gcloud compute scp \
            --zone "${{ vars.GCP_COMPUTE_ZONE }}" \
            deploy.tgz \
            "${{ vars.GCP_VM_NAME }}:~/deploy.tgz"

      - name: Deploy on VM
        run: |
          gcloud compute ssh "${{ vars.GCP_VM_NAME }}" \
            --zone "${{ vars.GCP_COMPUTE_ZONE }}" \
            --command '
              set -e
              mkdir -p ~/apps/mini-banking-transfer-system
              rm -rf ~/apps/mini-banking-transfer-system/*
              tar -xzf ~/deploy.tgz -C ~/apps/mini-banking-transfer-system
              cd ~/apps/mini-banking-transfer-system
              PROFILE="${{ env.DEPLOY_PROFILE }}"
              chmod +x scripts/start-services.sh scripts/stop-services.sh scripts/seed-demo-data.sh
              sudo docker-compose -f infra/docker-compose.yml --profile "$PROFILE" down --remove-orphans || true
              sudo docker-compose -f infra/docker-compose.yml --profile "$PROFILE" up -d
              until curl -fsS http://localhost:8001/status >/dev/null; do
                echo "Waiting for Kong Admin API..."
                sleep 2
              done
              until curl -fsS http://localhost:8001/services/transaction-service >/dev/null; do
                echo "Waiting for Kong bootstrap data..."
                sleep 2
              done
              ./scripts/stop-services.sh || true
              ./scripts/start-services.sh
              sleep 30
              ./scripts/seed-demo-data.sh || true
              echo "Deploy profile: $PROFILE"
            '

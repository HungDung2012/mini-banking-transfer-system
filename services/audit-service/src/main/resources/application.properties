spring.application.name=audit-service
server.port=8086
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/audit_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:banking}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:banking}
spring.jpa.hibernate.ddl-auto=update
spring.kafka.bootstrap-servers=${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:29092}
spring.kafka.consumer.group-id=audit-service
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.value.default.type=com.btlbanking.audit.kafka.TransferEvent
spring.kafka.consumer.properties.spring.json.trusted.packages=com.btlbanking.audit.kafka,com.btlbanking.audit.domain
spring.kafka.consumer.properties.spring.json.use.type.headers=false
management.endpoints.web.exposure.include=health,info,prometheus,metrics
management.endpoint.health.show-details=always
management.prometheus.metrics.export.enabled=true
management.metrics.tags.application=${spring.application.name}
management.metrics.distribution.percentiles-histogram.http.server.requests=true
management.tracing.sampling.probability=1.0
management.otlp.tracing.endpoint=${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4318/v1/traces}
logging.pattern.level=%5p [${spring.application.name:app},traceId:%X{traceId:-},spanId:%X{spanId:-},requestId:%X{requestId:-}]

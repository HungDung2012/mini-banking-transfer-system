_format_version: "3.0"
_transform: true

services:
  - name: auth-service
    url: http://172.30.0.1:8081/auth
    routes:
      - name: auth-route
        paths:
          - /api/auth
        strip_path: true
  - name: transaction-service
    url: http://172.30.0.1:8084/transfers
    routes:
      - name: transfer-route
        paths:
          - /api/transfers
        strip_path: true

plugins:
  - name: jwt
    service: transaction-service
    config:
      key_claim_name: sub
      claims_to_verify:
        - exp
      header_names:
        - authorization


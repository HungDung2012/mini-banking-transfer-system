openapi: 3.0.3
info:
  title: Notification Service API
  version: 1.0.0
  description: API truy vấn thông báo và observability endpoint của notification-service.
servers:
  - url: /
paths:
  /notifications/account/{accountNumber}:
    get:
      summary: Lấy danh sách thông báo theo tài khoản
      parameters:
        - in: path
          name: accountNumber
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Thành công
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/NotificationResponse'
  /actuator/health:
    get:
      summary: Health check
      responses:
        '200':
          description: Trạng thái service
  /actuator/prometheus:
    get:
      summary: Export metrics cho Prometheus
      responses:
        '200':
          description: Metrics text format
components:
  schemas:
    NotificationResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        transferId:
          type: string
          format: uuid
        recipientAccount:
          type: string
        sourceAccount:
          type: string
        title:
          type: string
        body:
          type: string
        status:
          type: string
        createdAt:
          type: string
          format: date-time

openapi: 3.0.3
info:
  title: Audit Service API
  version: 1.0.0
  description: Audit service hiện không có business API public; file này mô tả actuator endpoint cho health và observability.
servers:
  - url: /
paths:
  /actuator/health:
    get:
      summary: Health check
      responses:
        '200':
          description: Trạng thái service
  /actuator/prometheus:
    get:
      summary: Export metrics cho Prometheus
      responses:
        '200':
          description: Metrics text format

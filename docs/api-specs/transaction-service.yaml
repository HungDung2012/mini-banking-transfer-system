openapi: 3.0.3
info:
  title: Transaction Service API
  version: 1.0.0
  description: API cho luồng chuyển tiền và observability endpoint của transaction-service.
servers:
  - url: /
paths:
  /transfers:
    post:
      summary: Tạo giao dịch chuyển tiền
      parameters:
        - in: header
          name: Authorization
          required: true
          schema:
            type: string
        - in: header
          name: Idempotency-Key
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTransferRequest'
      responses:
        '200':
          description: Giao dịch được xử lý
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TransferResponse'
        '400':
          description: Payload không hợp lệ hoặc idempotency conflict
        '401':
          description: JWT không hợp lệ
        '409':
          description: Xung đột nghiệp vụ
  
  /actuator/health:
    get:
      summary: Health check
      responses:
        '200':
          description: Trạng thái service
  /actuator/prometheus:
    get:
      summary: Export metrics cho Prometheus
      responses:
        '200':
          description: Metrics text format
components:
  schemas:
    CreateTransferRequest:
      type: object
      required: [sourceAccount, destinationAccount, amount]
      properties:
        sourceAccount:
          type: string
        destinationAccount:
          type: string
        amount:
          type: number
          format: double
    TransferResponse:
      type: object
      properties:
        transferId:
          type: string
          format: uuid
        status:
          type: string
          enum: [PENDING, SUCCESS, FAILED, COMPENSATED, REJECTED]
